name: Java CI/CD Local

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-run-docker:
    runs-on: self-hosted   # ✅ your Mac runner

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Set up JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # 3️⃣ Build Maven project
      - name: Build Maven project
        run: mvn clean install
        working-directory: zen

      # 4️⃣ Build Docker image locally
      - name: Build Docker image
        working-directory: zen
        run: docker build -t zen-api:latest .

      # 5️⃣ Run Docker container locally
      - name: Run Docker container
        run: |
          docker stop zen-api || true
          docker rm zen-api || true
          docker run -d --name zen-api -p 8080:8080 zen-api:latest