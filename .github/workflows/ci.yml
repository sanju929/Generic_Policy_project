name: Java CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # Build Maven project in subfolder
      - name: Build with Maven
        run: mvn clean install
        working-directory: zen  # <-- keep as 'zen' if pom.xml is here

      # Upload the JAR artifact (optional)
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: zen-jar
          path: zen/target/*.jar