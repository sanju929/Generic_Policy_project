name: Java CI/CD with Docker

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # 3️⃣ Build Maven project
      - name: Build Maven project
        run: mvn clean install
        working-directory: zen

      # 4️⃣ Build Docker image
      - name: Build Docker image
        working-directory: zen
        run: docker build -t zen-api:latest .

      # 5️⃣ Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 6️⃣ Push Docker image to Docker Hub
      - name: Push Docker image
        run: |
          docker tag zen-api:latest ${{ secrets.DOCKER_USERNAME }}/zen-api:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/zen-api:latest

      # 7️⃣ Deploy Docker container on server
      - name: Deploy on server
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            echo "Stopping previous container..."
            docker stop zen-api || true
            docker rm zen-api || true
            echo "Pulling latest Docker image..."
            docker pull ${{ secrets.DOCKER_USERNAME }}/zen-api:latest
            echo "Starting new container..."
            docker run -d --name zen-api -p 8080:8080 ${{ secrets.DOCKER_USERNAME }}/zen-api:latest
            echo "Deployment complete!"